 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-50">

    <header class="bg-white shadow-sm p-6 text-center">
        <h1 class="text-3xl font-bold text-slate-800">منصة وجهات السياحية</h1>
        <p class="text-slate-500 mt-2">اختر وجهتك القادمة بكل سهولة</p>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="offers-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const apiUrl = "رابط_الـ_API_الخاص_بك"; // لا تنسَ وضع رابطك هنا

        async function fetchOffers() {
            const res = await fetch(apiUrl);
            const data = await res.json();
            const container = document.getElementById('offers-container');

            data.forEach(offer => {
                container.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition duration-300 overflow-hidden border border-slate-100">
                        <img src="${offer.image}" class="w-full h-56 object-cover">
                        <div class="p-5">
                            <span class="bg-blue-100 text-blue-600 text-xs px-2 py-1 rounded-full font-bold">${offer.type}</span>
                            <h2 class="text-xl font-bold mt-3 text-slate-800">${offer.title}</h2>
                            <p class="text-slate-500 text-sm mt-1 mb-4">${offer.dest}</p>
                            <div class="flex justify-between items-center mt-4 border-t pt-4">
                                <span class="text-2xl font-bold text-blue-700">${offer.price} <small class="text-sm">د.ل</small></span>
                                <a href="https://wa.me/${offer.phone}?text=مرحباً، أود الاستفسار عن ${offer.title}" 
                                   class="bg-slate-900 text-white px-5 py-2 rounded-xl hover:bg-slate-800">احجز الآن</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        fetchOffers();
    </script>
</body>
</html>
